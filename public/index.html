<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seven Lives</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css?v=1.10.58">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Planner navigation">
        <div class="brand">
          <span class="mark" aria-hidden="true">7</span>
          <div>
            <h1 class="brand-wordmark"><span>Seven</span><span>Lives</span></h1>
            <p id="storage-status">Local storage</p>
            <p id="app-version">Version</p>
          </div>
        </div>

        <nav class="views" aria-label="Planner views">
          <button class="view-button active" data-view="home" type="button">Home <span id="count-home">0</span></button>
          <div class="nav-group-label">Key Objects</div>
          <button class="view-button nested" data-view="tasks" type="button">Tasks <span id="count-tasks">0</span></button>
          <button class="view-button nested" data-view="goals" type="button">Goals <span id="count-goals">0</span></button>
          <button class="view-button nested" data-view="projects" type="button">Projects <span id="count-projects">0</span></button>
          <button class="view-button nested" data-view="people" type="button">People <span id="count-people">0</span></button>
          <button class="view-button nested" data-view="ideas" type="button">Ideas <span id="count-ideas">0</span></button>
          <div class="nav-group-label">Relationships</div>
          <button class="view-button nested" data-view="goal-assignments" type="button">Tasks to Goals <span id="count-goal-assignments">0</span></button>
          <button class="view-button nested" data-view="people-projects" type="button">People to Projects <span id="count-people-projects">0</span></button>
          <div class="nav-group-label">Views</div>
          <button class="view-button nested" data-view="graph" type="button">Task Graph <span id="count-graph">0</span></button>
          <button class="view-button nested" data-view="timeline" type="button">Timeline <span id="count-timeline">0</span></button>
          <button class="view-button nested" data-view="people-filter" type="button">People Filter <span id="count-people-filter">0</span></button>
          <button class="view-button nested" data-view="people-charts" type="button">People charts <span id="count-people-charts">0</span></button>
          <button class="view-button nested" data-view="project-filter" type="button">Project Filter <span id="count-project-filter">0</span></button>
          <button class="view-button nested" data-view="project-charts" type="button">Project charts <span id="count-project-charts">0</span></button>
          <div class="nav-group-label">Annotations</div>
          <button class="view-button nested" data-view="areas" type="button">Areas <span id="count-areas">0</span></button>
          <button class="view-button nested" data-view="skills" type="button">Skills <span id="count-skills">0</span></button>
          <button class="view-button nested" data-view="age-categories" type="button">Age Categories <span id="count-age-categories">0</span></button>
          <button class="view-button nested" data-view="roles" type="button">Roles <span id="count-roles">0</span></button>
          <button class="view-button nested" data-view="relationships" type="button">Relationships <span id="count-relationships">0</span></button>
          <button class="view-button nested" data-view="project-types" type="button">Project Types <span id="count-project-types">0</span></button>
          <button class="view-button nested" data-view="project-statuses" type="button">Project Status <span id="count-project-statuses">0</span></button>
          <button class="view-button nested" data-view="venues" type="button">Venues <span id="count-venues">0</span></button>
        </nav>

        <section class="tag-panel" aria-label="Tag filters">
          <div class="panel-label">Tags</div>
          <div id="tag-filters" class="tag-filters">
            <button class="tag-filter active" data-tag="" type="button">All</button>
          </div>
        </section>

        <div class="quick-stats">
          <div>
            <strong id="stat-open">0</strong>
            <span>open</span>
          </div>
          <div>
            <strong id="stat-focus">0</strong>
            <span>high</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p id="today-label"></p>
            <h2 id="view-title">Home</h2>
          </div>
          <div class="toolbar">
            <input id="search" type="search" placeholder="Search tasks" aria-label="Search tasks">
            <div class="density-control" aria-label="Display density">
              <button id="density-down" class="ghost-button density-button" type="button" title="Decrease density">-</button>
              <span id="density-label">Comfort</span>
              <button id="density-up" class="ghost-button density-button" type="button" title="Increase density">+</button>
            </div>
            <button id="key-button" class="ghost-button" type="button">Key</button>
            <button id="sync-button" class="ghost-button" type="button" title="Sync">Sync</button>
          </div>
        </header>

        <div id="sync-status" class="sync-status hidden" role="status"></div>
        <div id="sync-error" class="sync-error hidden" role="alert"></div>

        <section id="task-filter-bar" class="task-filter-bar hidden" aria-label="Task filters">
          <button class="task-filter-button active" data-task-filter="today" type="button">Today <span id="count-today">0</span></button>
          <button class="task-filter-button" data-task-filter="upcoming" type="button">Upcoming <span id="count-upcoming">0</span></button>
          <button class="task-filter-button" data-task-filter="backlog" type="button">Backlog <span id="count-backlog">0</span></button>
          <button class="task-filter-button" data-task-filter="done" type="button">Done <span id="count-done">0</span></button>
        </section>

        <section id="entry-panel" class="entry-panel creation-panel" aria-label="Add task">
          <div class="planning-section-head">
            <h4>Add new Task</h4>
          </div>
          <form id="task-form" class="task-form">
            <label class="field-label">Title
              <input id="title" name="title" type="text" placeholder="New task" autocomplete="off" required>
            </label>
            <label class="field-label">Parent task
              <select id="parent-id" name="parentId" aria-label="Parent task">
                <option value="">No parent</option>
              </select>
            </label>
            <label class="field-label">Area
              <select id="area" name="area" aria-label="Area"></select>
            </label>
            <label class="field-label">Goal
              <select id="goal-id" name="goalId" aria-label="Goal">
                <option value="">No goal</option>
              </select>
            </label>
            <label class="field-label">Project
              <select id="project-id" name="projectId" aria-label="Project">
                <option value="">No project</option>
              </select>
            </label>
            <label class="field-label">Priority
              <select id="priority" name="priority" aria-label="Priority">
                <option>Medium</option>
                <option>High</option>
                <option>Low</option>
              </select>
            </label>
            <label class="field-label">Due
              <input id="due-date" name="dueDate" type="date" aria-label="Due date">
            </label>
            <label class="field-label">Tags
              <input id="tags" name="tags" type="text" placeholder="Tags" aria-label="Tags">
            </label>
            <button class="primary-button form-submit" type="submit">Add</button>
          </form>
        </section>

        <section id="planner-grid" class="planner-grid">
          <div class="task-board">
            <div class="board-head">
              <h3 id="board-title">Tasks</h3>
              <div class="board-tools">
                <label class="toggle">
                  <input id="show-done" type="checkbox">
                  <span>Show done</span>
                </label>
                <select id="sort" aria-label="Sort tasks">
                  <option value="manual">Manual</option>
                  <option value="due">Due date</option>
                  <option value="priority">Priority</option>
                  <option value="created">Created</option>
                </select>
              </div>
            </div>
            <div id="task-list" class="task-list" aria-live="polite"></div>
          </div>

          <div id="resize-handle" class="resize-handle" role="separator" aria-orientation="vertical" aria-label="Resize task details pane" tabindex="0"></div>

          <aside class="detail-pane" aria-label="Task details">
            <div id="empty-detail" class="empty-detail">
              <h3>Select a task</h3>
              <p>Details, notes, energy, and status will appear here.</p>
            </div>
            <form id="detail-form" class="detail-form hidden">
              <div class="detail-form-head">
                <span>Task editor</span>
                <button id="expand-task-button" class="icon-button expand-task-button" type="button" title="Open full task editor" aria-label="Open full task editor">
                  <span aria-hidden="true">⛶</span>
                </button>
              </div>
              <input id="detail-id" type="hidden">
              <label>
                Title
                <input id="detail-title" type="text" required>
              </label>
              <label>
                Notes
                <textarea id="detail-notes" rows="7"></textarea>
              </label>
              <label>
                Parent task
                <select id="detail-parent">
                  <option value="">No parent</option>
                </select>
              </label>
              <label>
                Goal
                <select id="detail-goal">
                  <option value="">No goal</option>
                </select>
              </label>
              <label>
                Project
                <select id="detail-project">
                  <option value="">No project</option>
                </select>
              </label>
              <label>
                Depends on
                <select id="detail-dependencies" multiple size="4"></select>
              </label>
              <label>
                Tags
                <input id="detail-tags" type="text" placeholder="comma separated tags">
              </label>
              <div class="two-col">
                <label>
                  Area
                  <select id="detail-area"></select>
                </label>
                <label>
                  Priority
                  <select id="detail-priority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                  </select>
                </label>
                <label>
                  Due
                  <input id="detail-due" type="date">
                </label>
                <label>
                  Energy
                  <select id="detail-energy">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                  </select>
                </label>
              </div>
              <div class="detail-actions">
                <button id="subtask-button" class="ghost-button" type="button">Add subtask</button>
                <button id="complete-button" class="complete-action-button" type="button"><span aria-hidden="true">✓</span>Mark done</button>
                <button id="delete-button" class="danger-button" type="button">Delete</button>
              </div>
            </form>
          </aside>
        </section>
      </main>
    </div>

    <dialog id="areas-dialog">
      <form method="dialog" id="area-form">
        <h2>Areas</h2>
        <p>Edit the category list and choose colors for task cards.</p>
        <div id="area-list" class="area-list"></div>
        <div class="area-add-row">
          <input id="new-area-name" type="text" placeholder="New area">
          <input id="new-area-color" type="color" value="#0e7c74" aria-label="Area color">
          <button id="add-area-button" class="primary-button" type="button">Add</button>
        </div>
        <div class="dialog-actions">
          <button class="primary-button" value="close" type="submit">Done</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirm-dialog" class="confirm-dialog">
      <form method="dialog" id="confirm-form">
        <h2 id="confirm-title">Confirm</h2>
        <p id="confirm-message"></p>
        <div class="dialog-actions">
          <button id="confirm-cancel" class="ghost-button" value="cancel" type="submit">Cancel</button>
          <button id="confirm-accept" class="danger-button" value="confirm" type="submit">Delete</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js?v=1.10.58" type="module"></script>
  </body>
</html>
